<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clutch — Update Pill Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-sans: "Hanken Grotesk", Inter, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", monospace;
      --color-background: #ffffff;
      --color-surface: #f9f9f9;
      --color-on-surface: #1a1c1c;
      --color-on-surface-variant: #71717a;
      --color-outline-variant: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: #ececec;
      color: var(--color-on-surface);
      min-height: 100vh;
      padding: 32px 24px 48px;
    }

    .page-header { max-width: 980px; margin: 0 auto 28px; }
    .page-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    .page-header p { font-size: 14px; color: var(--color-on-surface-variant); margin-top: 6px; }

    .grid {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 28px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .panel-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-on-surface-variant);
      margin-bottom: 10px;
    }

    .mock-window {
      border: 1px solid #d4d4d4;
      border-radius: 14px;
      overflow: hidden;
      background: var(--color-background);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      min-height: 280px;
      position: relative;
    }

    .titlebar {
      height: 38px;
      background: linear-gradient(#f5f5f5, #ebebeb);
      border-bottom: 1px solid #d4d4d4;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
    }

    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green { background: #28c840; }

    .app-shell { display: flex; min-height: 242px; background: var(--color-surface); }

    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--color-outline-variant);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar-nav { flex: 1; color: var(--color-on-surface-variant); font-size: 12px; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(229, 231, 235, 0.5);
      min-width: 0;
    }

    .footer-row {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      min-width: 0;
    }

    .settings-btn {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-on-surface-variant);
      border: none;
      background: transparent;
      text-align: left;
      border-radius: 8px;
    }

    .update-actions {
      display: flex;
      flex-shrink: 0;
      align-items: center;
      gap: 4px;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-on-surface-variant);
      font-size: 13px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: default;
      border: 1px solid transparent;
      min-width: 0;
    }

    .btn-primary {
      background: #171717;
      color: white;
      border-color: #171717;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .btn-primary.flex-1 { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn-ghost {
      background: transparent;
      color: #525252;
      border-color: rgba(229, 229, 229, 0.6);
      flex-shrink: 0;
      padding-left: 8px;
      padding-right: 8px;
    }

    .btn-primary .mono {
      font-family: var(--font-mono);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .spinner {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-footer {
      position: absolute;
      bottom: 0;
      left: 280px;
      right: 0;
      height: 32px;
      border-top: 1px solid var(--color-outline-variant);
      background: white;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px;
      font-size: 11px;
      color: var(--color-on-surface-variant);
      font-style: italic;
    }

    .note {
      max-width: 980px;
      margin: 28px auto 0;
      padding: 14px 16px;
      border-radius: 12px;
      background: white;
      border: 1px solid var(--color-outline-variant);
      font-size: 13px;
      line-height: 1.6;
      color: #525252;
    }

    .note code {
      font-family: var(--font-mono);
      font-size: 11px;
      background: #f5f5f5;
      padding: 1px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>Clutch Update Pill Preview</h1>
    <p>Settings 同一行右侧 · compact · 280px sidebar</p>
  </div>

  <div class="grid" id="preview-grid"></div>

  <div class="note">
    本地打开：<code>docs/previews/update-banner-preview.html</code><br />
    实现：<code>sidebar.tsx</code> footer + <code>UpdateBanner.tsx</code> — 「Update / Later」「6%」「Restart」
  </div>

  <script>
    const spinner = '<svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';

    const states = {
      available: {
        label: "Available",
        html: `
          <div class="footer-row">
            <div class="settings-btn">⚙ Settings</div>
            <div class="update-actions">
              <button type="button" class="btn btn-primary" title="New version available: v1.13.1">Update</button>
              <button type="button" class="btn btn-ghost">Later</button>
            </div>
          </div>`,
      },
      downloading: {
        label: "Downloading",
        html: `
          <div class="footer-row">
            <div class="settings-btn">⚙ Settings</div>
            <div class="update-actions">
              <button type="button" class="btn btn-primary" disabled>${spinner}<span class="mono">6%</span></button>
            </div>
          </div>`,
      },
      ready: {
        label: "Ready",
        html: `
          <div class="footer-row">
            <div class="settings-btn">⚙ Settings</div>
            <div class="update-actions">
              <button type="button" class="btn btn-primary">Restart</button>
            </div>
          </div>`,
      },
    };

    document.getElementById("preview-grid").innerHTML = Object.keys(states)
      .map((state) => `
        <section>
          <div class="panel-label">${states[state].label}</div>
          <div class="mock-window">
            <div class="titlebar">
              <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
            </div>
            <div class="app-shell">
              <aside class="sidebar">
                <div class="sidebar-nav">Projects…</div>
                <div class="sidebar-footer">
                  ${states[state].html}
                </div>
              </aside>
              <div class="main">Main chat area</div>
              <div class="status-footer">Clutch v1.0.1</div>
            </div>
          </div>
        </section>`).join("");
  </script>
</body>
</html>
