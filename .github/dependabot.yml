# Dependabot — OSR T1 security hygiene (dependency CVE alerts + update PRs).
# Enable "Dependabot alerts" in repo Settings if not auto-enabled after merge.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /services/orchestrator
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
