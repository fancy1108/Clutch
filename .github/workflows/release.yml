# Build unsigned macOS DMG on version tags and attach to GitHub Release.
# OSR-12 · signing (OSR-11) deferred per DECISIONS D31.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach rebuilt DMG (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Secret & bundle preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (release gate)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release preflight
        run: ./scripts/release-preflight.sh

  build-macos-dmg:
    name: Build & upload DMG
    needs: preflight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd services/orchestrator && uv sync --extra dev

      - name: Release preflight (macOS)
        run: ./scripts/release-preflight.sh

      - name: Build DMG
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: SHA256 checksums
        run: |
          cd apps/desktop/src-tauri/target/release/bundle/dmg
          shasum -a 256 *.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload release assets (new tag)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: .github/RELEASE_GATEKEEPER_NOTICE.md
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/dmg/SHA256SUMS.txt

      - name: Upload release assets (rebuild existing tag)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/dmg/SHA256SUMS.txt
