name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # npm registry signing keys rotated; bundled Corepack on GHA runners may fail
      # to verify packageManager (pnpm@9.15.0). Install pnpm via action-setup instead.
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: ./scripts/check-doc-drift.sh
      - run: pnpm build
      - run: pnpm test

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Backend tests
        working-directory: services/orchestrator
        run: uv sync --extra dev && uv run pytest
